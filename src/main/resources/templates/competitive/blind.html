<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Blind Coding | CodeChef Arena</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body {
            background: #020617;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .blind-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 80px 40px;
            text-align: center;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
        }
        .monkey-eye {
            font-size: 80px;
            margin-bottom: 30px;
            display: inline-block;
            filter: grayscale(1);
            transition: all 0.5s;
        }
        .blind-card:hover .monkey-eye { filter: grayscale(0) drop-shadow(0 0 20px gold); }
        h1 { font-size: 40px; font-weight: 900; color: #facc15; }
        .warning-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 20px;
            border-radius: 15px;
            margin: 30px 0;
            color: #f87171;
            font-weight: 600;
        }
        .btn-focus {
            background: #facc15;
            color: #020617;
            padding: 18px 50px;
            border-radius: 12px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-focus:hover { box-shadow: 0 0 30px rgba(250, 204, 21, 0.4); transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="blind-card">
        <div class="monkey-eye">🙈</div>
        <h1>Blind Coding</h1>
        <p style="color:#64748b;">Code without sight. No execution. No errors. Just logic.</p>
        
        <div class="warning-box">
            CRITICAL: Compiler feedback is DISABLED for this mode.
        </div>

        <a th:href="@{/ide}" class="btn-focus">Enter Darkness</a>
        <div style="margin-top:30px;">
            <a th:href="@{/}" style="color:#475569; font-weight:600; text-decoration:none;">Return to Light</a>
        </div>
    </div>
</body>
</html>
