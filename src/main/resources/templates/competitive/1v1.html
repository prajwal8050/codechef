<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>1v1 Battles | CodeChef Arena</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .arena-container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        .match-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 80px 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        .match-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(249, 115, 22, 0.1), transparent 30%);
            animation: rotate 10s linear infinite;
            z-index: -1;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .pulse-icon {
            font-size: 80px;
            margin-bottom: 30px;
            display: inline-block;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(249, 115, 22, 0.4)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px rgba(249, 115, 22, 0.8)); }
        }
        .status-text {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(135deg, #f97316, #f43f5e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .searching-dots span {
            animation: dot-blink 1.4s infinite;
            opacity: 0;
        }
        .searching-dots span:nth-child(2) { animation-delay: 0.2s; }
        .searching-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .wait-time {
            color: #94a3b8;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .exit-btn {
            display: inline-block;
            margin-top: 50px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }
        .exit-btn:hover {
            background: white;
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        /* Matchmaking visualization */
        .match-viz {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
        }
        .user-hub {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 4px solid rgba(255, 255, 255, 0.1);
        }
        .vs-circle {
            width: 60px;
            height: 60px;
            background: #f97316;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.6);
        }
        .opponent-hub {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 4px dashed rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: rgba(255, 255, 255, 0.2);
            animation: spin-slow 4s linear infinite;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="arena-container">
        <div class="match-card" id="match-card">
            <div class="pulse-icon" id="main-icon">⚔️</div>
            <h1 class="status-text" id="status-title">Finding Opponent<span class="searching-dots" id="dots"><span>.</span><span>.</span><span>.</span></span></h1>
            
            <div class="match-viz">
                <div class="user-hub">
                    <span th:text="${session.user != null ? #strings.substring(session.user.username,0,1).toUpperCase() : 'A'}">A</span>
                </div>
                <div class="vs-circle">VS</div>
                <div class="opponent-hub" id="opponent-hub">?</div>
            </div>

            <div id="opponent-details" style="display: none; margin-bottom: 30px; animation: fadeIn 0.8s ease;">
                <h2 style="font-size: 28px; font-weight: 800; color: white; margin-bottom: 5px;">CodeBot v2.0</h2>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <span style="background: rgba(249, 115, 22, 0.2); color: #f97316; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;">7-Star AI</span>
                    <span style="background: rgba(99, 102, 241, 0.2); color: #6366f1; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase;">Rating: 2840</span>
                </div>
            </div>

            <p class="wait-time" id="wait-info">Estimated wait: <span id="timer">15</span>s</p>
            
            <div id="action-area">
                <a th:href="@{/}" class="exit-btn" id="abort-btn">Abort Mission</a>
            </div>
        </div>
    </div>

    <script>
        let seconds = 15;
        const timerEl = document.getElementById('timer');
        const statusTitle = document.getElementById('status-title');
        const opponentHub = document.getElementById('opponent-hub');
        const opponentDetails = document.getElementById('opponent-details');
        const waitInfo = document.getElementById('wait-info');
        const actionArea = document.getElementById('action-area');
        const mainIcon = document.getElementById('main-icon');

        const countdown = setInterval(() => {
            if (seconds > 7) {
                seconds--;
                timerEl.textContent = seconds;
            } else {
                clearInterval(countdown);
                foundOpponent();
            }
        }, 1000);

        function foundOpponent() {
            statusTitle.innerHTML = 'MATCH FOUND!';
            statusTitle.style.background = 'linear-gradient(135deg, #10b981, #3b82f6)';
            statusTitle.style.webkitBackgroundClip = 'text';
            statusTitle.style.backgroundClip = 'text';
            
            mainIcon.textContent = '🔥';
            mainIcon.style.animation = 'pulse-glow 0.5s ease-in-out infinite';

            opponentHub.textContent = '🤖';
            opponentHub.style.background = '#6366f1';
            opponentHub.style.color = 'white';
            opponentHub.style.animation = 'none';
            opponentHub.style.borderStyle = 'solid';
            opponentHub.style.borderColor = 'rgba(255,255,255,0.4)';
            opponentHub.style.fontSize = '50px';

            opponentDetails.style.display = 'block';
            waitInfo.style.display = 'none';

            actionArea.innerHTML = `
                <a href="/ide" class="exit-btn" style="background:#f97316; border-color:#f97316; color:white; width: 100%; max-width: 300px; display:inline-block;">BATTLE START</a>
            `;
        }
    </script>
</body>
</html>
