<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Discuss | CodeChef</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div style="display:flex; align-items:center;">
        <a href="/" class="navbar-brand">
            <div class="brand-icon">C</div> CodeChef
        </a>
        <ul class="navbar-nav">
            <li><a th:href="@{/practice}">Practice</a></li>
            <li><a th:href="@{/compete}">Compete</a></li>
            <li><a th:href="@{/courses}">Courses</a></li>
            <li><a th:href="@{/discuss}" class="active">Discuss</a></li>
            <li><a th:href="@{/ide}">IDE</a></li>
        </ul>
    </div>
    <div class="navbar-right">
        <div class="nav-search-box">
            <input type="text" placeholder="Search discussions..."/>
        </div>
        <div th:if="${session.user == null}" style="display:flex; gap:10px;">
            <a th:href="@{/login}" class="btn btn-outline btn-sm">Login</a>
            <a th:href="@{/signup}" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
        <div th:if="${session.user != null}" style="display:flex; align-items:center; gap:12px;">
            <div class="user-avatar" th:title="${session.user.username}"
                 th:text="${#strings.substring(session.user.username,0,1).toUpperCase()}">U</div>
            <a th:href="@{/logout}" class="btn btn-outline btn-sm" style="border:none; color:var(--cc-text-muted);">Logout</a>
        </div>
    </div>
</nav>

<div class="page-container" style="max-width: 900px;">

    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:40px;">
        <div>
            <h1 style="font-size:32px; font-weight:900; color:#0f172a;">Discuss</h1>
            <p style="color:#64748b;">Join the community. Ask questions, share knowledge, and learn.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()" style="padding:12px 25px;">+ New Topic</button>
    </div>

    <div>
        <div th:each="t : ${topics}" class="card"
             style="padding:25px; margin-bottom:15px; display:flex; gap:25px; align-items:center; border:none; box-shadow:0 10px 30px rgba(0,0,0,0.02);">
            <div style="text-align:center; min-width:50px;">
                <span style="display:block; font-size:12px; font-weight:800; color:#64748b;">▲</span>
                <span style="font-weight:900; font-size:18px; color:#0f172a;" th:text="${t.upvotes}">0</span>
            </div>
            <div style="flex:1;">
                <a th:href="@{'/discuss/' + ${t.id}}" style="text-decoration:none;">
                    <h3 style="margin-bottom:8px; font-size:18px; color:#0f172a;" th:text="${t.title}">Topic</h3>
                </a>
                <div style="display:flex; gap:15px; font-size:13px; color:#94a3b8; font-weight:600;">
                    <span th:text="'By ' + ${t.author}">By author</span>
                    <span th:text="'• ' + ${#temporals.format(t.createdAt, 'MMM dd, HH:mm')}">date</span>
                    <a th:href="@{'/discuss/' + ${t.id}}" style="color:#f97316; font-weight:700; text-decoration:none;"
                       th:text="'• ' + ${t.repliesCount} + ' replies →'">• 0 replies →</a>
                </div>
            </div>
            <span th:class="'badge badge-' + ${t.tag}" th:text="${t.tag}">tag</span>
            <div style="display:flex; gap:8px;">
                <button class="edit-btn"
                        th:attr="data-id=${t.id}, data-title=${t.title}, data-tag=${t.tag}"
                        style="padding:8px 14px; background:#f1f5f9; border:none; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; color:#475569;">
                    ✏️ Edit
                </button>
                <form th:action="@{'/discuss/delete/' + ${t.id}}" method="post" style="display:inline;"
                      onsubmit="return confirm('Are you sure you want to delete this topic?')">
                    <button type="submit"
                            style="padding:8px 14px; background:#fee2e2; border:none; border-radius:8px; font-weight:700; font-size:12px; cursor:pointer; color:#ef4444;">
                        🗑 Delete
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- NEW TOPIC MODAL -->
    <div id="topicModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:40px; border-radius:20px; width:500px; box-shadow:0 20px 50px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom:25px; font-weight:900;">Start a Discussion</h2>
            <form th:action="@{/discuss/save}" method="post">
                <input type="text" name="title" placeholder="Topic Title"
                       style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #e2e8f0; border-radius:12px; outline:none; box-sizing:border-box;" required/>
                <select name="tag" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #e2e8f0; border-radius:12px; background:white; box-sizing:border-box;">
                    <option value="help">HELP</option>
                    <option value="editorial">EDITORIAL</option>
                    <option value="general">GENERAL</option>
                </select>
                <textarea name="content" placeholder="What's on your mind?"
                          style="width:100%; padding:15px; margin-bottom:25px; border:1px solid #e2e8f0; border-radius:12px; height:120px; outline:none; resize:none; box-sizing:border-box;"></textarea>
                <div style="display:flex; justify-content:flex-end; gap:15px;">
                    <button type="button" onclick="closeModal()"
                            style="padding:12px 20px; border:none; background:transparent; font-weight:700; color:#64748b; cursor:pointer;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="padding:12px 30px;">Post Topic</button>
                </div>
            </form>
        </div>
    </div>

    <!-- EDIT TOPIC MODAL -->
    <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:40px; border-radius:20px; width:500px; box-shadow:0 20px 50px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom:25px; font-weight:900;">Edit Discussion</h2>
            <form id="editForm" action="#" method="post">
                <input type="text" id="editTitle" name="title" placeholder="Topic Title"
                       style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #e2e8f0; border-radius:12px; outline:none; box-sizing:border-box;" required/>
                <select id="editTag" name="tag"
                        style="width:100%; padding:15px; margin-bottom:25px; border:1px solid #e2e8f0; border-radius:12px; background:white; box-sizing:border-box;">
                    <option value="help">HELP</option>
                    <option value="editorial">EDITORIAL</option>
                    <option value="general">GENERAL</option>
                </select>
                <div style="display:flex; justify-content:flex-end; gap:15px;">
                    <button type="button" onclick="closeEditModal()"
                            style="padding:12px 20px; border:none; background:transparent; font-weight:700; color:#64748b; cursor:pointer;">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="padding:12px 30px;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal()      { document.getElementById('topicModal').style.display = 'flex'; }
        function closeModal()     { document.getElementById('topicModal').style.display = 'none'; }
        function closeEditModal() { document.getElementById('editModal').style.display  = 'none'; }

        document.querySelectorAll('.edit-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var id    = this.dataset.id;
                var title = this.dataset.title;
                var tag   = this.dataset.tag;
                document.getElementById('editForm').action = '/discuss/edit/' + id;
                document.getElementById('editTitle').value = title;
                document.getElementById('editTag').value   = tag;
                document.getElementById('editModal').style.display = 'flex';
            });
        });
    </script>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
