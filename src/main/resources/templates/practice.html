<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Practice Problems | CodeChef</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:#f8fbff;">

<nav class="navbar">
    <div style="display:flex; align-items:center;">
        <a href="/" class="navbar-brand">
            <div class="brand-icon">C</div> CodeChef
        </a>
        <ul class="navbar-nav">
            <li><a th:href="@{/practice}" class="active">Practice</a></li>
            <li><a th:href="@{/compete}">Compete</a></li>
            <li><a th:href="@{/courses}">Courses</a></li>
            <li><a th:href="@{/discuss}">Discuss</a></li>
            <li><a th:href="@{/ide}">IDE</a></li>
        </ul>
    </div>
</nav>

<div class="page-container" style="max-width: 1100px; margin-top: 40px;">
    <div style="margin-bottom: 40px;">
        <h1 style="font-size: 32px; font-weight: 800; color: var(--cc-text);">Practice Problems</h1>
        <p style="color: var(--cc-text-muted);">Master algorithms and data structures through curated practice sets.</p>
    </div>

    <div style="display: grid; grid-template-columns: 280px 1fr; gap: 40px;">
        <!-- Filters Sidebar -->
        <div class="sidebar">
            <div class="card" style="padding: 24px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.02); background: white;">
                <h4 style="margin-bottom: 20px; font-weight: 800;">Difficulty</h4>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <label style="display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: #475569;">
                        <input type="checkbox" checked/> Beginner
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: #475569;">
                        <input type="checkbox"/> Intermediate
                    </label>
                    <label style="display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: #475569;">
                        <input type="checkbox"/> Advanced
                    </label>
                </div>
            </div>
        </div>

        <!-- Problems List -->
        <div>
            <div th:each="p : ${problems}" class="card" 
                 style="padding: 24px; margin-bottom: 16px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.02); background: white; display: flex; justify-content: space-between; align-items: center; transition: transform .2s;">
                <div>
                     <span th:class="'badge badge-' + ${p.difficulty.toString().toLowerCase()}" th:text="${p.difficulty}">EASY</span>
                     <h3 style="margin: 10px 0 5px; font-size: 18px; font-weight: 800; color: #0f172a;" th:text="${p.title}">Problem Title</h3>
                     <p style="color: #64748b; font-size: 14px;" th:text="${p.description}">Description</p>
                </div>
                <a th:href="@{'/problem/' + ${p.id}}" class="btn btn-primary" style="padding: 10px 25px;">Solve Now</a>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
