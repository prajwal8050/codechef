<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Problems | CodeChef Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:#f1f5f9;">

<nav class="navbar" style="background:#0f172a;">
    <div style="display:flex; align-items:center;">
        <a href="/admin" class="navbar-brand">
            <div class="brand-icon">A</div> Admin Portal
        </a>
        <ul class="navbar-nav">
             <li><a th:href="@{/admin/problems}" class="active">Problems</a></li>
             <li><a th:href="@{/admin/contests}">Contests</a></li>
             <li><a th:href="@{/admin/courses}">Courses</a></li>
        </ul>
    </div>
</nav>

<div class="page-container" style="max-width: 1000px; margin-top: 50px;">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:40px;">
        <h1 style="font-size: 28px; font-weight: 800;">Manage Problems</h1>
        <a th:href="@{/admin/problems/add}" class="btn btn-primary">+ Add New Problem</a>
    </div>

    <div class="card" style="padding:0; border:none; background:white; overflow:hidden;">
        <table style="width:100%; border-collapse:collapse; text-align:left;">
            <thead style="background:#f8fafc; border-bottom:1px solid #e2e8f0;">
                <tr>
                    <th style="padding:20px; font-size:13px; font-weight:800; color:#475569;">TITLE</th>
                    <th style="padding:20px; font-size:13px; font-weight:800; color:#475569;">DIFFICULTY</th>
                    <th style="padding:20px; font-size:13px; font-weight:800; color:#475569;">ACTIONS</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${problems}" style="border-bottom:1px solid #f1f5f9;">
                    <td style="padding:20px; font-weight:700;" th:text="${p.title}">title</td>
                    <td style="padding:20px;">
                        <span th:class="'badge badge-' + ${p.difficulty.toString().toLowerCase()}" th:text="${p.difficulty}">EASY</span>
                    </td>
                    <td style="padding:20px;">
                        <a href="#" style="color:#6366f1; font-weight:700; text-decoration:none; font-size:14px;">Edit</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
