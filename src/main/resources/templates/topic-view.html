<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${topic.title}">Discussion | CodeChef</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background:#f1f5f9;">

<nav class="navbar">
    <div style="display:flex; align-items:center;">
        <a href="/" class="navbar-brand">
            <div class="brand-icon">C</div> CodeChef
        </a>
    </div>
</nav>

<div class="page-container" style="max-width: 900px; margin-top: 50px;">
    <a th:href="@{/discuss}" style="text-decoration:none; color:#64748b; font-weight:700; font-size:14px; display:inline-block; margin-bottom:25px;">← Back to All Discussions</a>

    <div class="card" style="padding:50px; border:none; box-shadow:0 20px 50px rgba(0,0,0,0.02); margin-bottom:40px; background:white;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:30px;">
            <div>
                <span th:class="'badge badge-' + ${topic.tag}" th:text="${topic.tag}" style="margin-bottom:15px; display:inline-block;">tag</span>
                <h1 style="font-size:36px; font-weight:900; color:#0f172a; margin-bottom:15px;" th:text="${topic.title}">Topic Title</h1>
                <div style="font-size:14px; color:#94a3b8; font-weight:600;">Started by <span style="color:#0f172a;">[[${topic.author}]]</span> • [[${#temporals.format(topic.createdAt, 'MMM dd, HH:mm')}]]</div>
            </div>
        </div>
        <p style="color:#475569; font-size:17px; line-height:1.8; margin-bottom:40px;" th:text="${topic.content}">Topic Content</p>
    </div>

    <!-- REPLIES SECTION -->
    <div style="margin-bottom:60px;">
        <h2 style="font-size:24px; font-weight:900; color:#0f172a; margin-bottom:30px;" th:text="${topic.repliesCount + ' Replies'}">0 Replies</h2>
        
        <div th:each="r : ${replies}" class="card" style="padding:30px; border:none; margin-bottom:15px; background:white;">
            <div style="display:flex; gap:15px; margin-bottom:15px;">
                <div style="width:35px; height:35px; background:#e2e8f0; border-radius:50%; font-weight:900; display:flex; align-items:center; justify-content:center; color:#0f172a; font-size:12px;" th:text="${#strings.substring(r.author,0,1).toUpperCase()}">A</div>
                <div>
                     <div style="font-weight:700; color:#0f172a; font-size:14px;" th:text="${r.author}">author</div>
                     <div style="font-size:11px; color:#94a3b8; font-weight:600;" th:text="${#temporals.format(r.createdAt, 'MMM dd, HH:mm')}">date</div>
                </div>
            </div>
            <p style="color:#475569; font-size:15px; line-height:1.7;" th:text="${r.content}">Reply content</p>
        </div>

        <!-- POST A REPLY -->
        <div class="card" style="padding:40px; border:none; background:white; margin-top:40px;">
            <h3 style="font-weight:900; margin-bottom:25px;">Post a Reply</h3>
            <form th:action="@{'/discuss/reply/' + ${topic.id}}" method="post">
                <textarea name="content" placeholder="Share your thoughts..." style="width:100%; padding:20px; border:1px solid #e2e8f0; border-radius:15px; height:150px; outline:none; resize:none;" required></textarea>
                <div style="display:flex; justify-content:flex-end; margin-top:20px;">
                    <button type="submit" class="btn btn-primary" style="padding:12px 30px;">Reply to Topic</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
