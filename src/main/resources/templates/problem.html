<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${problem.title}">Problem | CodeChef</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body style="background: #f8fafc; height: 100vh; overflow: hidden; display: flex; flex-direction: column;">

<!-- NAVBAR -->
<nav class="navbar" style="flex-shrink: 0;">
    <div style="display:flex; align-items:center;">
        <a href="/" class="navbar-brand">
            <div class="brand-icon">C</div> CodeChef
        </a>
        <div style="margin-left: 20px; font-weight:700; color:#0f172a; border-left: 1px solid #e2e8f0; padding-left: 20px;" th:text="${problem.title}">Problem Name</div>
    </div>
    <div class="navbar-right">
        <div class="nav-search-box">
             <input type="text" placeholder="Search problems..."/>
        </div>
        <div th:if="${session.user == null}" style="display:flex; gap:10px;">
            <a th:href="@{/login}" class="btn btn-outline btn-sm">Login</a>
            <a th:href="@{/signup}" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
        <div th:if="${session.user != null}" style="display:flex; align-items:center; gap:12px;">
            <div class="user-avatar" th:title="${session.user.username}" th:text="${#strings.substring(session.user.username,0,1).toUpperCase()}">U</div>
            <a th:href="@{/logout}" class="btn btn-outline btn-sm" style="border:none; color:var(--cc-text-muted);">Logout</a>
        </div>
    </div>
</nav>

<!-- PROBLEM PAGE LAYOUT -->
<div class="problem-page" style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0; overflow: hidden;">
    
    <!-- LEFT PANEL: PROBLEM STATEMENT -->
    <div class="problem-statement" style="padding: 40px; overflow-y: auto; background: white; border-right: 1px solid #e2e8f0;">
        <div style="margin-bottom: 30px;">
            <span th:class="'badge badge-' + ${problem.difficulty.toString().toLowerCase()}" th:text="${problem.difficulty}">EASY</span>
            <h1 style="font-size: 28px; font-weight: 800; margin-top: 10px;" th:text="${problem.title}">Title</h1>
        </div>

        <div class="statement-section" style="margin-bottom: 40px;">
            <h3 style="font-size: 14px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; margin-bottom: 15px;">Statement</h3>
            <p style="color: #475569; line-height: 1.8; font-size: 16px;" th:text="${problem.description}">Description</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 40px;">
            <div>
                <h3 style="font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 10px;">Input Format</h3>
                <p style="font-size: 14px; color: #64748b;" th:text="${problem.inputFormat}">Input format</p>
            </div>
            <div>
                <h3 style="font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 10px;">Output Format</h3>
                <p style="font-size: 14px; color: #64748b;" th:text="${problem.outputFormat}">Output format</p>
            </div>
        </div>

        <div th:each="tc : ${problem.testcases}" style="margin-top: 40px;">
            <div style="background: #f1f5f9; padding: 25px; border-radius: 12px;">
                <h4 style="font-size: 12px; margin-bottom: 10px; color: #64748b;">SAMPLE INPUT</h4>
                <pre style="background: white; padding: 15px; border-radius: 6px; font-size: 14px; color: #0f172a;" th:text="${tc.input}">Input</pre>
                
                <h4 style="font-size: 12px; margin: 20px 0 10px; color: #64748b;">SAMPLE OUTPUT</h4>
                <pre style="background: white; padding: 15px; border-radius: 6px; font-size: 14px; color: #0f172a;" th:text="${tc.expectedOutput}">Output</pre>
            </div>
        </div>
    </div>

    <!-- RIGHT PANEL: IDE -->
    <div class="ide-panel" style="display: flex; flex-direction: column; background: #0f172a;">
        
        <!-- IDE HEADER -->
        <div style="padding: 15px 25px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center;">
            <select id="language" style="background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 6px; font-size: 13px; outline: none;">
                <option value="cpp" style="color: black;">C++ (G++ 17)</option>
                <option value="java" style="color: black;">Java (OpenJDK 11)</option>
                <option value="python" style="color: black;">Python 3.9</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary btn-sm" onclick="runCode()">Run Samples</button>
                <button class="btn btn-success btn-sm" onclick="submitCode()" style="background: #10b981; border-color: #10b981;">Submit Code</button>
            </div>
        </div>

        <!-- CODE EDITOR -->
        <div style="flex: 1; position: relative;">
            <textarea id="editor" spellcheck="false" style="width: 100%; height: 100%; background: transparent; color: #e2e8f0; padding: 30px; font-family: 'Consolas', 'Courier New', monospace; font-size: 15px; line-height: 1.6; border: none; outline: none; resize: none;"
                placeholder="// Write your solution here..."></textarea>
        </div>

        <!-- OUTPUT CONSOLE -->
        <div id="console" style="height: 250px; background: #0b1120; border-top: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column;">
            <div style="padding: 10px 25px; font-size: 12px; font-weight: 800; color: #94a3b8; background: rgba(0,0,0,0.2); display: flex; justify-content: space-between; align-items: center;">
                <span>CONSOLE OUTPUT</span>
                <span id="status-label" style="color: #6366f1;">IDLE</span>
            </div>
            <div id="result" style="flex: 1; padding: 25px; font-family: 'Consolas', monospace; font-size: 14px; overflow-y: auto;">
                <div style="color: #475569;">Ready for execution. Press 'Run Samples' to test against provided testcases.</div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const problemId = [[${problem.id}]];

    function runCode() {
        sendRequest('/api/execute/run');
    }

    function submitCode() {
        sendRequest('/api/execute/submit');
    }

    function sendRequest(endpoint) {
        const code = document.getElementById('editor').value;
        const lang = document.getElementById('language').value;
        const resultDiv = document.getElementById('result');
        const statusLabel = document.getElementById('status-label');

        if(!code.trim()) {
            alert('Please write some code first!');
            return;
        }

        statusLabel.textContent = 'EXECUTING...';
        resultDiv.innerHTML = '<div style="color: #94a3b8;">Processing your code against test cases...</div>';

        fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code, language: lang, problemId: problemId })
        })
        .then(res => res.json())
        .then(data => {
            statusLabel.textContent = data.status || 'DONE';
            if (data.status === 'ACCEPTED') {
                resultDiv.innerHTML = '<div style="color: #10b981; font-weight: 900;">✅ ALL TESTCASES PASSED!</div><div style="color: #e2e8f0; margin-top:10px;">' + (data.output || '') + '</div>';
            } else if (data.status === 'WRONG_ANSWER') {
                resultDiv.innerHTML = '<div style="color: #ef4444; font-weight: 900;">❌ WRONG ANSWER</div><div style="color: #e2e8f0; margin-top:10px;">Your output did not match. Check sample logic.</div>';
            } else {
                resultDiv.innerHTML = '<div style="color: #e2e8f0;">' + (data.output || 'Execution complete.') + '</div>';
            }
        })
        .catch(err => {
            statusLabel.textContent = 'ERROR';
            resultDiv.innerHTML = '<div style="color: #ef4444;">Connection failed. Ensure backend service is running.</div>';
        });
    }
</script>

</body>
</html>
